<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
    <style>
      body {
        background-color: black;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1 id="Count">0</h1>
    <button id="btn" onclick="increment()">Click me</button>

    <script>
      let count = document.getElementById("Count");
      let countel = 0;

      function increment() {
        countel++;
        count.innerText = countel;
      }
    </script>
  </body>
</html>
