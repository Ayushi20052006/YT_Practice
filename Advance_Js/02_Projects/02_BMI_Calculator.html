<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calcultor</title>
    <style>
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }
      .result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
      }
      body {
        background-color: rgba(39, 42, 40, 0.643);
        font-family: Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>BMI Calculator</h1>
      <form action="">
        <p>
          <label for="">Heigth in cm</label>
          <input type="number" id="height" placeholder="Enter height" />
        </p>
        <p>
          <label for="">Weight in kg</label>
          <input type="number" id="weight" placeholder="Enter weight" />
        </p>
        <button type="submit">Calculate</button>
        <div class="result"></div>
        <div class="weigth_guide">
          <h3>Weight Categories:</h3>
          <ul>
            <li>Underweight: BMI &lt; 18.5</li>
            <li>Normal weight: BMI 18.5 - 24.9</li>
            <li>Overweight: BMI 25 - 29.9</li>
            <li>Obese: BMI &gt;= 30</li>
          </ul>
        </div>
      </form>
    </div>
    <script>
      document.querySelector("form").addEventListener("submit", (e) => {
        e.preventDefault(); // Prevent default form submission
        const height = parseInt(document.getElementById("height").value);
        const weight = parseFloat(document.getElementById("weight").value);
        if (height && weight) {
          const bmi = (weight / (height * height)) * 10000;
          let category = "";
          if (bmi < 18.5) {
            category = "Underweight";
          } else if (bmi >= 18.5 && bmi < 25) {
            category = "Normal weight";
          } else if (bmi >= 25 && bmi < 30) {
            category = "Overweight";
          } else {
            category = "Obese";
          }
          document.querySelector(".result").innerText =
            `Your BMI is ${bmi.toFixed(2)} (${category})`;
        } else {
          alert("Please enter both height and weight");
        }
      });
