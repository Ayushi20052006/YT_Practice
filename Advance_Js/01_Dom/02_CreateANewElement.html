<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <script>
        const div = document.createElement('div');
        div.className='box';
        div.id='id';
        div.setAttribute('title','generated title using set attribute');
        div.style.backgroundColor = 'red';
        div.style.width = '200px';
        div.style.height = '200px';
        console.log(div);
        div.innerText = 'This is the text added using innerText\n';
        const text = document.createTextNode('This is the text added using createTextNode');
        div.appendChild(text);            //to add the created text node in the div
        document.body.appendChild(div);    //to add the div in the body of the doc
        
    </script>
        
</body>
</html>
